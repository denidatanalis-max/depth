<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#000;
            color:#fff;
            font-family:Arial, sans-serif;
            text-align:center;
        }

        .box{
            padding:20px;
        }

        .code{
            font-size:90px;
            margin:0;
            color:#ff4da6;
            text-shadow:0 0 15px #c8f03b;
            animation: colorChange 2.5s infinite;
        }

        @keyframes colorChange {
            0% {
                color:#ff4da6;
                text-shadow:0 0 15px #c8f03b;
            }
            50% {
                color:#000;
                text-shadow:0 0 20px rgba(255,255,255,0.8);
            }
            100% {
                color:#ff4da6;
                text-shadow:0 0 15px #c8f03b;
            }
        }

        h2{
            margin:10px 0;
            font-size:22px;
            color:#c8f03b;
        }

        p{
            font-size:14px;
            color:#c8f03b;
            line-height:1.6;
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:10px 20px;
            border:1px solid #c8f03b;
            color:#ff66b2;
            text-decoration:none;
            border-radius:8px;
            transition:0.2s;
        }

        a:hover{
            background:#ff66b2;
            color:#000;
        }
    </style>
</head>

<body>
