<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#000000; /* merah elegan */
            color:#ffffff;
            font-family: Arial, Helvetica, sans-serif;
            text-align:center;
        }

        .box{
            padding:20px;
        }

        h1{
            font-size:80px;
            margin:0;
            font-weight:700;
        }

        h2{
            font-size:22px;
            margin:10px 0;
            font-weight:500;
        }

        p{
            font-size:14px;
            opacity:0.9;
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:10px 20px;
            border:1px solid #fff;
            color:#fff;
            text-decoration:none;
            border-radius:6px;
            transition:0.2s;
        }

        a:hover{
            background:#fff;
            color:#000000;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>Halaman tidak ditemukan atau sudah dipindahkan.</p>

        <a href="/">Kembali ke Dashboard</a>
    </div>
    <script>
        setTimeout(function () {
            window.location.href = "/";
        }, 1500);
    </script>
</body>
</html>
